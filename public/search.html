<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>검색 | 앱테크 허브</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="header-left">
        <a class="header-icon-btn" href="/" aria-label="홈">
          <span class="material-symbols-outlined">grid_view</span>
        </a>
        <span class="brand-name">앱테크 허브</span>
      </div>
      <a class="header-icon-btn" id="headerBell" href="/benefits.html#alerts" aria-label="알림">
        <span class="material-symbols-outlined">notifications</span>
        <span class="alert-dot"></span>
      </a>
    </div>
  </header>

  <main class="container">
    <section class="mobile-search" style="display: block">
      <div class="search-box">
        <span class="material-symbols-outlined">search</span>
        <input type="text" id="searchInput" placeholder="앱 이름이나 혜택을 검색하세요" />
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>인기 검색어</h2>
        <span class="section-link" style="color: var(--color-outline); cursor: default">리뷰 많은 순</span>
      </div>
      <div id="keywordRow" class="keyword-row"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>카테고리</h2>
      </div>
      <div id="categoryGrid" class="mission-grid" style="grid-template-columns: repeat(5, 1fr)"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2 id="listTitle">추천 앱테크</h2>
      </div>
      <div id="appList" class="card-grid" style="grid-template-columns: 1fr; gap: 12px"></div>
    </section>
  </main>

  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="/" class="bottom-nav-item">
        <span class="material-symbols-outlined">home</span>
        <span>홈</span>
      </a>
      <a href="/events" class="bottom-nav-item">
        <span class="material-symbols-outlined">redeem</span>
        <span>이벤트</span>
      </a>
      <a href="/search" class="bottom-nav-item active">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">search</span>
        <span>검색</span>
      </a>
      <a href="/community" class="bottom-nav-item">
        <span class="material-symbols-outlined">groups</span>
        <span>커뮤니티</span>
      </a>
      <a href="/benefits.html" class="bottom-nav-item">
        <span class="material-symbols-outlined">person</span>
        <span>마이페이지</span>
      </a>
    </div>
  </nav>

  <script type="module" src="/js/search.js"></script>
</body>
</html>
