<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>앱테크 허브 | 대한민국 앱테크 통합 플랫폼</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="header-left">
        <a class="header-icon-btn" href="/" aria-label="홈">
          <span class="material-symbols-outlined">grid_view</span>
        </a>
        <span class="brand-name">앱테크 허브</span>
      </div>
      <a class="header-icon-btn" id="headerBell" href="/benefits.html#alerts" aria-label="알림">
        <span class="material-symbols-outlined">notifications</span>
        <span class="alert-dot"></span>
      </a>
    </div>
  </header>

  <div class="disclaimer-banner">
    <div class="container">
      <span>⚠️</span>
      <span>표시된 예상 수익은 실제 검증되지 않은 샘플(예시) 데이터입니다. 실제 리워드는 앱 정책 및 시점에 따라 달라질 수 있어요.</span>
    </div>
  </div>

  <main class="container">
    <section class="section">
      <div class="section-head">
        <h2>오늘 받을 수 있는 혜택</h2>
      </div>
      <div id="heroCard" class="hero-card hero-card--light"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>카테고리 둘러보기</h2>
      </div>
      <div id="missionGrid" class="mission-grid"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>지금 주목받는 앱</h2>
        <span class="material-symbols-outlined" style="color: var(--color-on-surface-variant)">chevron_right</span>
      </div>
      <div id="promoRow" class="promo-row"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>아직 안 쓰는 인기 앱</h2>
        <a href="/benefits.html" class="section-link">
          내 혜택 전체보기 <span class="material-symbols-outlined" style="font-size: 16px">chevron_right</span>
        </a>
      </div>
      <div id="recommendedList" class="card-grid" style="grid-template-columns: 1fr; gap: 12px"></div>
    </section>
  </main>

  <a href="/benefits.html#checklist" class="fab-btn" aria-label="내 앱 체크하기">
    <span class="material-symbols-outlined" style="font-size: 26px">add_task</span>
  </a>

  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="/" class="bottom-nav-item active">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">home</span>
        <span>홈</span>
      </a>
      <a href="/events" class="bottom-nav-item">
        <span class="material-symbols-outlined">redeem</span>
        <span>이벤트</span>
      </a>
      <a href="/search" class="bottom-nav-item">
        <span class="material-symbols-outlined">search</span>
        <span>검색</span>
      </a>
      <a href="/community" class="bottom-nav-item">
        <span class="material-symbols-outlined">groups</span>
        <span>커뮤니티</span>
      </a>
      <a href="/benefits.html" class="bottom-nav-item">
        <span class="material-symbols-outlined">person</span>
        <span>마이페이지</span>
      </a>
    </div>
  </nav>

  <script type="module" src="/js/home.js"></script>
</body>
</html>
